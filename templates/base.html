<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mental Health Predictor{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232A9D8F' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z'/><path d='M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z'/><path d='M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4'/><path d='M17.599 6.5a3 3 0 0 0 .399-1.375'/><path d='M6.003 5.125A3 3 0 0 0 6.401 6.5'/><path d='M3.477 10.896a4 4 0 0 1 .585-.396'/><path d='M19.938 10.5a4 4 0 0 1 .585.396'/><path d='M6 18a4 4 0 0 1-1.967-.516'/><path d='M19.967 17.484A4 4 0 0 1 18 18'/></svg>"
        type="image/svg+xml">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block head %}{% endblock %}
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <header class="navbar no-print">
            <div class="container nav-container">
                <a href="/" class="logo">
                    <i data-lucide="brain" class="icon-primary"></i>
                    <span>Mental<span class="text-primary">Health</span>Predictor</span>
                </a>

                <!-- Desktop Nav -->
                <nav class="nav-links desktop-only">
                    <a href="/" class="nav-link"><i data-lucide="home"></i> Home</a>
                    <a href="/survey" class="nav-link"><i data-lucide="clipboard-list"></i> Survey</a>
                </nav>

                <!-- Mobile Menu Button -->
                <button class="mobile-menu-btn mobile-only" id="mobile-menu-toggle" aria-label="Toggle Menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </header>

        <!-- Mobile Navigation Overlay -->
        <div class="mobile-nav-overlay" id="mobile-nav">
            <div class="mobile-nav-header">
                <a href="/" class="logo">
                    <i data-lucide="brain" class="icon-primary"></i>
                    <span>Mental<span class="text-primary">Health</span>Predictor</span>
                </a>
                <button class="mobile-menu-btn" id="mobile-menu-close" aria-label="Close Menu">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="mobile-nav-links">
                <a href="/" class="mobile-nav-link"><i data-lucide="home"></i> Home</a>
                <a href="/survey" class="mobile-nav-link"><i data-lucide="clipboard-list"></i> Survey</a>
            </nav>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Toast Notifications Container -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script>
        // Use Lucide for icons
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // Mobile menu logic
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const mobileMenuClose = document.getElementById('mobile-menu-close');
            const mobileNav = document.getElementById('mobile-nav');

            const toggleMenu = () => {
                mobileNav.classList.toggle('active');
                document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
            };

            if (mobileMenuToggle) mobileMenuToggle.addEventListener('click', toggleMenu);
            if (mobileMenuClose) mobileMenuClose.addEventListener('click', toggleMenu);

            // Close menu on link click
            document.querySelectorAll('.mobile-nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    mobileNav.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
